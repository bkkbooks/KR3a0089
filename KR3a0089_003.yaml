body:
  text: 周子抄釋附録宋史道學本傳道學之名古無是也三代盛時天子以是道為政教大臣百官有司以是道為職業黨庠術序師弟子以是道為講習四方百姓日用是道而不知是故盈覆載之間無一民一物不被是道之澤以遂其性於斯時也道學之名何自而立哉文王周公既沒孔子有德無位既不能使是道之用漸被斯世退而與其徒定禮樂明憲章刪詩書修春秋讃易象討論墳典期使三五聖人之道昭明於無窮故曰夫子賢於堯舜逺矣孔子沒曾子獨得其傳傳之子思以及孟子孟子沒而無傳兩漢而下儒者之論大道察焉而弗精語焉而弗詳異端邪説起而乘之幾至大壞千有餘載至宋中葉周惇頥出於舂陵乃得聖賢不傳之學作太極圖説通書推明隂陽五行之理命於天而性於人者瞭若指掌張載作西銘又極言理一分殊之旨然後道之大原出於天者灼然而無疑焉仁宗明道初年程皓及弟頥實生及長受業周氏已乃擴大其所聞表章大學中庸二篇與語孟並行於是上自帝王傳心之奧下至初學入德之門融會貫通無復餘藴迄宋南渡新安朱熹得程氏正傳其學加親切焉大抵以格物致知為先明善誠身為要凡詩書六藝之文與夫孔孟之遺言顛錯於秦火支離於漢儒幽沉於魏晉六朝者至是皆焕然而大明秩然而各得其所此宋儒之學所以度越諸子而上接孟氏者歟其於世代之汚隆氣化之榮悴有所關係也甚大道學盛於宋宋弗究於用甚至有厲禁焉後之時君世主欲復天德王道之治必來此取法矣邵雍高明英悟程氏實推重之舊史列之隱逸未當今置張載後張栻之學亦出程氏既見朱熹相與博約又大進焉其他程朱門人考其源委各以類從作道學傳周惇頥字茂叔道州營道人元名惇實避英宗舊諱改焉以舅龍圖閣學士鄭珦任為分寧主簿有獄久不決惇頥至一訊立辨邑人驚曰老吏不如也部使者薦之調南安軍司理參軍有囚法不當死轉運使王逵欲深治之逵酷悍吏也衆莫敢爭惇頥獨與之辨不聽乃委手板歸將棄官去曰如此尚可仕乎殺人以媚人吾不為也逵悟囚得免移郴之桂陽令治績尤著郡守李初平賢之語之曰吾欲讀書何如惇頥曰公老無及矣請為公言之二年果有得徙知南昌南昌人皆曰是能辨分寧獄者吾屬得所訴矣富家大姓黠吏惡少惴惴焉不獨以得罪於令為憂而又以汚穢善政為恥歷合州判官事不經手吏不敢決雖下之民不肯從部使者趙抃惑於譖口臨之甚威惇頥處之超然通判虔州抃守虔熟視其所為乃大悟執其手曰吾幾失君矣今而後乃知周茂叔也熙寧初知郴州用抃及吕公著薦為廣東轉運判官提點刑獄以洗寃澤物為己任行部不憚勞苦雖瘴癘險逺亦緩視徐按以疾求知南康軍因家廬山蓮花峯下前有溪合於湓江取營道所居濓溪以名之抃再鎮蜀將奏用之未及而卒年五十七黃庭堅稱其人品甚高胸懷灑落如光風霽月亷於取名而鋭於求志薄於徼福而厚於得民菲於奉身而燕及煢嫠陋於希世而尚友千古博學力行著太極圖明天理之根源究萬物之終始其説曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣聖人定之以中正仁義而主靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之説大哉易也斯其至矣又著通書四十篇發明太極之藴序者謂其言約而道大文質而義精得孔孟之本源大有功於學者也掾南安時程珦通判軍事視其氣貌非常人與語知其為學知道因與為友使二子皓頥往受業焉惇頥每令尋孔顔樂處所樂何事二程之學源流乎此矣故皓之言曰自再見周茂叔後吟風弄月以歸有吾與點也之意侯師聖學於程頥未悟訪惇頥惇頥曰吾老矣説不可不詳留對榻夜談越三日乃還頥驚異之曰非從周茂叔來耶其善開發人類此嘉定十三年賜諡曰元公淳祐元年封汝南伯從祀孔子廟庭二子壽燾燾官至寶文閣待制先生墓碣銘大字晦菴刪本小字蒲碣全文蒲宗孟始豫有女弟明爽端淑欲求配而未之得嘉祐己亥泛蜀江道合陽與周君語三日三夜退而歎曰世有斯人歟真吾妹之敵也明年以吾妹歸之周君世為營道人始名光宗御諱實避英宗藩邸名改光宗御諱頥曾祖從逺祖智強皆不仕父輔成賀州桂嶺縣令纍贈諫議大夫母鄭氏仙居縣太君君少孤養於舅家鄭舅為龍圖閣學士以恩補君試將作監主簿自其窮時慨然欲有所施以見於世故仕而必行其志為政必有能名初從吏部調洪州分寧主簿未幾南安獄上屢覆轉運使薦君為南安軍司理參軍移郴州郴縣令又為桂陽令分寧有獄不決君至一訊立辨邑人驚詫曰老吏不如也南安囚法不當死轉運使欲深治之君爭不勝投其司理參軍告身以去曰如此尚可仕乎殺人以媚人吾不為也轉運使感悟囚卒得不死自桂陽用薦者言改大理寺丞知洪之南昌南昌人見君來咸曰是能辨分寧獄者吾屬得所訴矣君益思以竒自名屠姦剪弊如快刀健斧落手無留富家大姓黠胥惡少惴惴懷恐不獨以得罪於君為憂而又以汙善政為恥也江之南九十餘邑如君比者無一二改太子中舍僉書合州判官事轉殿中丞賜五品服一郡之事不經君手吏不敢決茍下之民不肯從蜀之賢人君子莫不喜稱之今資政殿學士趙公為使者小人隂中君趙公惑比去尚疑君有過嘉祐中轉國子博士通判虔州趙公來守虔熟視君所為執君手曰幾失君矣今日乃知周茂叔也英宗登極遷尚書虞部員外郎虔大火焚其州改通判永州轉比部員外郎今上即位遷駕部員外郎熙寧元年擢授廣南東路轉運判官三年轉虞部郎中提點本路刑獄君以朝廷躐等見用奮發感厲不憚出入之勤瘴毒之侵雖荒崖絶島人迹所不至處皆緩視徐按務以洗寃澤物為己任施設置措未及盡其所為而君已病矣病且劇念其母未葬求南康以歸葬已君曰強疾而來者為葬耳今猶欲以病汙麾紱耶病且劇三字元在上晦菴移於此上南康印分司南京趙公再尹成都聞君之去拜章乞起君朝命及門疾已革熙寧六年六月七日卒卒年五十七嗟乎茂叔命止斯乎先時以書抵宗孟曰上方興起數百年無有難能之事捋圖大平天下微才小智茍有所長者莫不皆獲自盡吾獨不能補助萬分又不得竊須臾之生以見堯舜禮樂之盛今死矣命也其語如此嗚呼可哀也已初娶陸氏縉雲縣君再娶吾妹德清縣君二子夀燾皆太廟齋郎君自少信古喜義以名節自高李初平守郴與君相好不以部中吏待君初平卒子幼不克葬君曰吾事也往來其家終始經紀之雖至貧不計資恤其宗族朋友分司而歸妻子饘粥不給君曠然不以為意也生平襟懷飄灑有高趣常以仙翁隱者自許尤樂佳山水遇適意處終日徜徉其間酷愛廬阜買田其旁築室以居號曰濓溪書堂乘興結客與高僧道人跨松蘿躡雲嶺放肆於山巔水涯彈琴吟詩經月不返及其以病還家猶藍舉而往登覽忘倦語其友曰今日出處無纍正可與公等為逍遙社但愧以病來耳君之卒四月十六日二甥求吾銘將以其年十一月二十一日葬君於江州德化縣德化鄉清泉社吾嘗謂茂叔為貧而仕仕而有所為亦大概略見於人人亦頗知之然至其孤風逺操寓懷於塵埃之外常有高棲遐遁之意則世人未必盡知之也於其死吾深悲焉故想像君之平生而寫其所好以寄之銘云來求銘三字續添銘曰廬山之月兮暮而明湓浦之風兮朝而清翁飄颻兮何所琴悄寂兮無聲杳乎欲訴而奚問浩乎欲忘而難平山巔水涯兮生既不得以自足死而葬乎其間兮又安知其不為清風白月往來於深林幽谷皎皎而泠泠也形骸兮歸此適所願兮攸安攸寧先生墓室記何子舉先生世家舂陵之濓溪今以故里名行於湓蓋襲舂陵舊耳自先生講道此邦距今幾二百年流風所漸民醇俗魯其為士也願而文過化之盛非止家藏書人誦言而已邦人瞻仰有祠學聚有堂墓道有表碣闕而未舉惟春秋之祭爼罍班榛荆襟佩濡露雨耳寶祐癸丑制帥陳公夢斗以南豫學子典郡事二年間恩浹和集以公於己者公於人克臻暇裕於縮迫中將以餘力起廢墜乃諏急先命理掾鳩工築室墓右踰時告成萃賔僚相祀妥厥像於中冠屨肅穆光霽洋洋如生也竣事命某有以識夫圖書之妙中天日月天下見道即見先生室之築特以寄瓣香勺齊之敬耳尚何言以藻繪斯道抑某反復左丞蒲公宗孟銘先生墓不能不扼腕於仲尼日月也其言曰先生疾革時致書某上方興起數千百年無有難能之事將圖太平天下材智皆圖自盡吾獨不能補助萬分一又不能竊須臾之生以見堯舜禮樂之盛今死矣命也嗟乎有是言哉先生之學靜虛動直明通公溥以無欲為入聖之門者也窮逹常變漠無繫纍浮雲行藏晝夜生死其所造詣夫豈執世俗戀榮偷生之見者所可窺其藩言焉不擇左丞安得為知先生者然則先生之道豈固信於來世而獨不知於姻親者哉按左丞黨金陵者也方金陵倡新法毒天下熏心寵榮者無慮皆和附一辭其所不然者惟特士醇儒未可以氣力奪左丞所云興起數千百年無有難能之事吾獨不能補助者得無影響借重為新法厚自扳援者耶牟叔遐征里粟議者難之遂借其説於子産徐逢吉以河內冦為平民預引更生之對實其事自古貿亂是非往往一轍若左丞者設易簀之言堅金陵無復忌憚之心騰自欺之舌誣先生於無從究詰之地其為毁譽求合罔世塞道又罪浮於臧倉者也因辨識末以質於當世君子又一年五月既望後學金華何子舉撰并書建安翁甫題額先生事狀朱子先生家世道州營道縣濓溪之上姓周氏名惇實字茂叔從避英宗舊名改惇頥用舅氏龍圖閣學士鄭公珦奏授洪州分寧縣主簿縣有獄久不決先生至一訊立辨衆口交稱之部使者薦以為南安軍司理參軍移郴及桂陽令用薦者改大理寺丞知洪州南昌縣事僉書合州判官廳公事通判虔州事改永州權發遣邵州事熙寧初用趙清獻公吕正獻公薦為廣南東路轉運判官改提點刑獄公事未幾而病亦會水齧其先墓遂求南康軍以歸既葬上其印綬分司南京時趙公再尹成都府復奏起先生朝命及門而先生卒矣熙寧六年六月有七日也年五十有七葬江州德化縣德化鄉清泉社先生博學力行聞道甚早遇事剛果有古人風為政精密嚴恕務盡道理嘗作太極圖易説易通數十篇在南安時年少不為守所知洛人程公珦攝通守事視其氣貌非常人與語知其為學知道也因與為友且使其二子往受學焉及為郎故事當舉代每一遷授輒以先生名聞在郴時郡守李公初平知其賢與之語而歎曰吾欲讀書何如先生曰公老無及矣某也請得為公言之於是初平日聽先生語二年果有得而程公二子即所謂河南二先生者也南安獄有囚法不當死轉運使王逵欲深治之逵苛刻吏無敢與相可否先生獨力爭之不聽則置手板歸取告身委之而去曰如此尚可仕乎殺人以媚人吾不為也逵亦感悟囚得不死在郴桂皆有治績來南昌縣人迎喜曰是能辨分寧獄者吾屬得所訴矣於是更相告語莫違教命蓋不惟以抵罪為憂實以汙善政為恥也在合州事不經先生吏不敢決茍下之民不肯從蜀之賢人君子皆喜稱之趙公時為使者人或讒先生趙公臨之甚威而先生處之超然趙公疑終不釋及守虔先生適佐州事趙公熟視其所為乃悟執其手曰幾失君矣今日乃知周茂叔也於邵州新學校以教其人及使嶺表不憚出入之勤瘴癘之侵雖荒崖絶島人迹所不至亦必緩視徐按務以洗寃澤物為己任施設置措未及盡其所為而病以歸矣自少信古好義以名節自砥礪奉己甚約俸祿盡以周宗族奉賔友家或無百錢之儲李初平卒子幼護其喪歸葬之又往來經紀其家始終不懈及分司而歸妻子􅊡粥或不給而亦曠然不以為意也襟懷飄灑雅有高趣尤樂佳山水遇適意處或徜徉終日廬山之麓有溪焉發源於蓮花峯下潔清紺寒下合於湓江先生濯纓而樂之因寓以濓溪之號而築書堂於其上豫章黃太史庭堅詩而序之曰茂叔人品甚髙胸中灑落如光風霽月知德者亦深有取於其言云晦菴即潘志蒲碣及孔司封黃太史所記先生行事之實刪去重復為此事狀濓溪先生行録前人先生姓周氏名惇實字茂叔避厚陵藩邸名改惇頥世居道州營道父輔成大中祥符八年登蔡齊榜進士第嘗為賀州桂嶺令贈諌議大夫母鄭氏封仙居縣太君先生少孤養外家景祐中用舅氏龍圖閣學士鄭公珦奏試將作監主簿授洪州分寧主簿先生博學力行遇事剛果有古人風其為政精密嚴恕務盡道理縣有獄久不決先生至一訊立辨衆口交稱之部使者薦其才為南安軍司理獄有囚法不當死轉運使王逵欲深治之逵苛刻吏無敢與相可否者先生獨與之辨不聽則置手板歸取告身委之而去曰如此尚可仕乎殺人以媚人吾不為也逵感悟囚得不死且賢先生薦之移郴州桂陽令皆有治績用薦者改大理寺丞知洪州南昌縣於是更相告語勿違教命而以汚善政為恥也改太子中舍人僉書合州判官事轉殿中丞一郡之事不經先生手吏不敢決民不肯從清獻公為使者小人或讒先生趙公臨之甚威而先生處之超然也轉國子博士通判虔州趙公來為守熟視先生所為執其手曰今日乃知周茂叔也遷尚書虞部員外郎通判永州權發遣邵州事新學校以教其人熙寧元年用趙公及吕正獻公薦為廣南東路轉運判官三年轉虞部郎中提點刑獄先生不憚出入之勞瘴毒之侵雖荒崖絶島人迹所不至處亦必緩視徐按務以洗寃澤物為己任設施措置未及盡其所為而先生病矣因請南康軍以歸趙公再尹成都復起先生朝命及門而先生卒矣熙寧六年六月七日也年五十有七葬江州德化縣清泉社娶陸氏封縉雲縣君再娶蒲氏封德清縣君子夀燾皆太廟齋郎先生所著書有太極圖易説易通數十篇詩十卷藏於家先生在南安時年甚少不為守所知洛人程公珦攝通守事視其氣貌非常人與語知其為學知道也因與為友且使其子皓頥受學焉及為郎故事當舉代每一遷授輒以薦之程公二子皆唱鳴道學以繼孔孟不傳之統世所謂二程先生者其原蓋自先生發之也在郴時其守李公初平知先生賢不以屬吏遇之既薦諸朝又周其乏困嘗聞先生論學歎曰吾欲讀書如何先生曰公老矣無及也惇頥請得為公言之初平逐日聽先生語蓋二年而有得王荆公提點江東刑獄時已號為通儒先生遇之與語連日夜荆公退而精思至忘寢食先生自少信古好義以名節自砥礪其奉已甚約俸祿盡以周宗族在南昌時得疾暴卒更一日夜始蘇或視其家止一敝篋錢不滿百李初平卒子幼不克葬先生護其喪歸葬之分司而歸妻子􅊡粥不給曠然不以為意也廬山之麓有溪焉築室其上名之曰濓溪因語其友清逸居士潘延之曰可仕可止古人無所必束髮為學將有以設施可澤於斯民者必不得已止未晚也此濓溪者異時與子相從於其上歌詠先王之道足矣此其出處之本意也豫章黃庭堅稱之曰茂叔人品甚高胸中灑落如光風霽月好讀書雅志林壑不卑小官職思其憂論法常欲與民決訟得情而不喜其為使者進退官吏得罪者自以不寃濓溪之名雖不足以對其美然茂叔廉於取名而樂於求志薄於徼福而厚於得民菲於奉身而燕及惸嫠短於希世而尚友千古聞茂叔之風猶足律貪則此溪之水配茂叔以永久所得多矣識者亦或有取於其言云周子抄釋附録
