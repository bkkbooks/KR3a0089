body:
  text: 周子抄釋卷二明吕柟撰拙賦第一或謂予曰人謂子拙予曰巧竊所恥也且患世多巧也喜而賦之巧者言拙者黙巧者勞拙者逸巧者賊拙者德巧者㓙拙者吉嗚呼天下拙刑政徹上安下順風清弊絶釋巧只是偽拙只是實愛蓮說第二水陸草木之花可愛者甚蕃晉陶淵明獨愛菊自李唐來世人甚愛牡丹予獨愛蓮之出淤泥而不染濯清漣而不夭中通外直不蔓不枝香逺益清亭亭淨植可逺觀而不可䙝玩焉予謂菊花之隱逸者也牡丹花之富貴者也蓮花之君子者也噫菊之愛陶之後鮮有聞蓮之愛同予者何人牡丹之愛宜乎衆矣釋周子不惟以陶自比其言富乎養心亭記第三孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣予謂養心不止於寡焉而存耳葢寡焉以至於無無則誠立明通誠立賢也明通聖也是聖賢非性生必養心而至之養心之善有大焉如此存乎其人而已張子宗範有行有文其居背山靣水山之麓構亭甚清淨予偶坐而愛之因題曰養心既謝且求說故書以勉釋寡欲亦允執厥中之義若至於無恐難通行於衆邵州遷學釋菜文第四惟夫子道高德厚教化無窮實與天地參而四時同上自國都下及州縣通立廟貌州守縣令春秋釋奠雖天子之尊入廟肅恭行禮其重誠與天地參焉儒衣冠學道業者列室於廟朝夕目瞻睟容心慕至德㡬於顔氏之子者有之得其位施其澤及生民者代有之然夫子之宫可忽歟而邵置於惡地掩於衙門左獄右庾穢喧歴年惇頥攝守州符嘗拜堂下惕汗流背起而議遷得地東南高明協卜用舊增新不日成就采章冕服儼坐有序諸生既集率僚告成謹以禮幣藻蘋式陳明薦以兖國公顔子等配維治平五年歳次戊申正月甲戌朔三日丙子朝奉郞尚書駕部員外郞通判永州軍州兼管内勸農事權發遣邵州軍州事上騎都尉賜緋魚袋周惇頥敢昭告於先師兖國公顔子爰以遷修廟學成恭修釋菜於先聖至聖文宣王惟子睿性通㣲實幾於聖明誠道確夫子稱賢謹以禮幣藻齊式陳明獻從祀配神釋配獨稱顔子則周子學行為人可想見矣吉州彭推官詩序第五惇實慶厯初為洪州分寧縣主簿被外臺檄承乏袁州盧溪鎭市征之局局鮮事袁之進士多來講學於公齋因談及今朝江左律詩之工坐間誦吉州彭推官篇者六七其句字信乎能覷天巧而膾炙人口矣我聞分寧新邑宰上未踰月而才明之譽已飛數百里有謂惇實曰邑宰太博思永即嚮所誦之詩推官之子也吉與袁鄰郡父兄輩皆識推官苐為善内樂殊忘官之高卑齒之壯老以至於没其慶將發於是乎惇實故又知推官之德暨還邑局聞推官之詩益多亦能記誦不忘十五年而太博為刑部郎中直史舘益州路轉運使惇實自南昌知縣就移僉署巴川郡判官㕔公事益梓鄰路也泝流赴局過渝州越三舍接巴川境間有温泉佛寺艤舟遊覽忽覩榜詩乃推官之作喜豁讀訖録本納於轉運公公復書重謝且曰願刻一石若䝉繼以短序尤荷厚意故序於詩後而命工刻石置寺之堂焉實嘉祐二年正月十五日云承奉郎守太子中舍僉署合州軍事判官㕔公事周惇實撰釋序止詳歴履而不言其詩美何似可知其恭矣簡書第六上二十六叔書云惇實啓孟秋猶熱伏惟二十六叔三十一叔諸叔母諸兄長尊體起居萬福周興來知安樂喜無盡惇實守官外與新婦幸如常不勞憂念來春歸鄉即遂拜侍床間伏望順時倍加保愛不備姪男惇實狀拜上七月六日夜二十六叔三十一叔諸叔母諸兄長座前諸弟諸姪安樂好將息好將息釋觀此書恭慈和睦之氣藹然可知其能復不善之動以齊家矣與仲章姪書云仲章夏熱計新婦男女安健我此中與叔母李老通老韓姐善二以下並安近逓中得先公加贈官誥贈諫議大夫家門幸事幸事汝備酒果香茶詣墳前告聞先公諌議也未相見千萬好將息不具叔押付仲章六月十四日諸處書立使周一父子送去叔母韓姐傳語汝與新婦姪女姪兒各計安好將息百一百二附兄嫂起居之問善二與新婦安安汝切不得來汝切不得來周翁夫妻安否周一父子看守墳塋小心否周㓜二安否如何也釋讀此書而不興孝慈之念者非夫也與傅茂才書云惇實頓首傅君茂才足下昨日飯㑹上草草致書不識已逹否日惟履用休適惇實自春來郡事併多又新守將至諸要備辦稍有一日空暇則或過客或節辰或不時聚㑹每㑹即作詩雅則雅矣形亦勞瘁故尚未有意思為足下作䇿問勿訝勿訝遂州平絞紗輕細者染得好皂者告買一疋自要作夏衫并買樗蒲綾袴叚二箇碎事煩聒愧悚愧悚急遣人探新守次走筆不謹暄燠加愛加愛不宣惇實頓首傅君茂才足下釋自是近人情而不詭慰李才元書云惇實頓首變故不常竊審尊夫人太君奄棄榮養伏惟號天永慕難以勝處罔極奈何孝思奈何敢冀節哀以從中制卑情不任苦痛之至謹奉疏以慰不宣謹疏四月某日汝南周惇實疏上釋其臨䘮也哀矣詩絶句第七釋絶句自見胸次飄然有道存焉有風還自掩無事晝常闗開闔從方便乾坤在此間題門扇退之自謂如夫子原道深排佛老非不識大顛何似者數書珍重更畱衣題大顛壁鳥落柴門掩夕暉昏鴉數㸃傍林飛吟餘小立闌干外遥見樵漁一路歸題春晚東風放牧出長坡誰識兒童樂趣多歸路轉鞭牛背上笛聲吹老太平歌題牧童琳宫金刹接林巒一徑潛通竹徑寒是處塵埃皆可息時清終未忍辭官經古寺劒立溪峯信險深吾皇大道正天心百年外户都無閉空有關名㸃貢琛題劒門聞有山巖即去尋亦躋雲外入松隂雖然未是洞中境且異人間名利心同友人遊羅巖紅塵白日無閑人况有魚緋繋此身闕上羅浮閑送目浩然心意復吾眞題惠州羅浮山山盤江上虬龍活殿倚雲中洞府深欽想眞風杳何在偃松喬栢共蕭森酆州仙都觀久厭塵坌樂靜元俸㣲猶乏買山錢徘徊眞境不能去且寄雲房一榻眠宿山房到官處處須㝷勝惟此合陽無勝尋赤水有山仙甚古攀躋聊足到官心遊赤水縣龍多山書仙臺觀壁尋山㝷水侣尤難愛利愛名心少閑此亦有君吾甚樂不辭髙逺共躋攀喜同費長官逰雲樹巖泉景盡竒登臨深恨訪尋遲長棲未得於何記猶有君能雅和詩和費君樂遊山之什詩五七言律第八劉侯戴武弁政則心吾儒士茂先興學子賢勤讀書猷為莫不善才力葢有餘西北方求帥浩然寧乆居題浩然閣一日復一日一杯復一杯青山無限好俗客不曾來往事一如此朱顔安在哉寄語地上客歴亂竟誰催題冦順之道院壁靜思歸舊隱日出半山晴醉榻雲籠潤吟忩瀑瀉清閑方為逹士忙只是勞生朝市誰頭白車輪未曉鳴思親歸舊隱三月山房暖林花互照明路盤層頂上人在半空行水色雲含白禽聲谷應清天風拂襟袂縹緲覺身輕逰大林寺清時望郎貴白首故鄉歸有子紆藍綬將孫着綵衣松喬新道院鶴老舊漁磯知止自髙德寧為遁者肥贈虞部譚眆致仕公程無暇日暫得宿清幽始覺空門客不生浮世愁温泉喧古洞晚磬度危樓徹曉都忘寐心疑在沃州宿大林寺秋風拂盡熱半夜雨淋漓遶屋是芭蕉一枕高響圍恰似釣魚船蓬底睡覺時書忩夜雨濓溪溪上釣思歸復思歸釣魚船好睡寵辱不相隨肯為爵禄重白髪猶覊縻石唐橋晚釣老子生來骨性寒宦情不改舊儒酸停盃厭飲香醪味舉筯嘗餐淡菜盤事冗不知筋力倦官清贏得夢魂安故人欲問吾何况為道舂陵只一般任所寄郷闗故舊公暇頻陪塵外遊朝天仍得送行舟軒車更共入山脚旌斾且從畱渡頭精舍泉聲清㶁㶁高林雲色淡悠悠談終道奥愁言去明日瞻思上郡樓萬安香城寺别處守趙公雜記第九伊川先生作其父太中公家傳曰公嘗假倅南安軍獄掾周惇實甚少不為守所知公視其氣貌非常人與語果為學知道者因與為友及為郎官故事當舉代每遷授輒一薦之釋周專務内若孔子并務内忘矣伊川先生作明道先生行狀曰先生自十五六時聞汝南周茂叔論道遂厭科舉之業慨然有求道之志釋宋之道學自汝南周子始河間劉立之敘述明道先生事曰先生從汝南周惇頥問學窮性命之理率性㑹道體道成德出入孔孟從容不勉釋周教人專在性命上理㑹程氏門人記二先生語曰昔受學於周茂叔令尋仲尼顔子樂處所樂何事釋樂在尋時猛省又曰明道先生言自再見周茂叔後吟風弄月以歸有吾與㸃也之意釋可想見茂叔之為人更有甚存著也又曰李初平見周茂叔云某欲讀書如何茂叔云公老矣無及矣待某只説與公初平遂聽説話二年乃覺悟釋説話處即是力行然亦有如此太守亦有如此縣令又曰王君貺嘗見茂叔為與茂叔世契便受拜及坐間大風起説大畜卦君貺乃起曰適來不知受却公拜今却當請納拜茂叔走避君貺此一事却過人謝用休問當受拜不當受拜曰分已定不受乃是一本作風天小畜卦釋前革還知謙讓一王君貺見善連尊卑都忘也又曰田獵自謂今無此好周茂叔曰何言之易也但此心潛隱未發一日萌動復如初矣後十二年因見果知未也釋必力行過方知此心復如初又曰周茂叔忩前草不除去問之云與自家意思一般子厚觀驢鳴亦謂如此釋自家意豈惟草與驢嗚乎又曰周茂叔謂荀子元不識誠伯淳曰既誠矣心焉用養邪荀子不知誠釋貶茍子大過大學中庸亦言誠邵伯温作易學辨惑記康節先生事曰伊川同朱光庭公掞訪先君先君畱之飲酒因以論道伊川指靣前食卓曰此卓安在地上不知天地安在甚處先君為極論天地萬物之理以及六合之外伊川歎曰平生惟見周茂叔論至此釋伊川聞諸周子者亦深乎吕本中作童蒙訓曰正獻公在侍從聞茂叔名力薦之自常調除轉運判官茂叔以啓謝正獻公云在薄宦有四方之遊於髙賢無一日之雅釋可謂直躬而行矣營道何弃仲農父自作營道齋詩序曰營道縣出郭三十里而近有村落曰濓溪周氏家焉族衆而業儒至先生逺宦弛肩廬阜力不能返故居乃結屋臨流寓濓溪之名志鄉關在目中也蘇黄二公與之同時而所為賦詩皆失本意文字傳誤吁可歎已濓溪之周至今蕃衍云釋乆宦至力不能返可知其為政矣邢恕和叔敘述明道先生事云茂叔聞道甚早釋􅢖邢亦推信云王荆公為江東提㸃刑獄時已號為通儒茂叔遇之與語連日夜荆公退而精思至忘寢食釋周子葢發荆公之初心也南豐潘興嗣墓誌銘曰吾友周茂叔諱惇頥其先營道人曾祖諱從逺祖諱智強皆不仕考諱輔成任賀州桂嶺縣令贈諌議大夫君㓜孤依舅氏龍圖閣學士鄭珦以君有逺器愛之如子龍圖公名子皆用惇字因以惇名君景祐中奏補試將作監主簿授洪州分寧縣君博學力行遇事剛果有古人風衆口交稱之部使者以君為有才奏舉南安軍司理參軍轉運使王逵以苛刻蒞下吏無敢可否君與之辨事不為屈因置手版歸取誥𠡠納之投劾而去逵為之改容復薦之移郴令改桂陽令皆有治績用薦者遷大理寺丞知洪州南昌縣其為治精宻嚴恕務盡道理民至今思之改太子中書簽判覃恩改虞部員外郎通判永州今上即位恩改駕部趙公抃入參大政奏君為廣南東路轉運判官稱其職遷虞部郎中提㸃本路刑獄君盡心職事務在矜恕雖瘴癘僻逺無所惮勞竟以此得疾懇請郡符知南康軍未㡬分司南京趙公抃復奏起君而君疾已篤熈寧六年六月七日卒於九江郡之私第享年五十七君篤氣義以名節自礪郴守李初平最知君既薦之又賙其所不給初平卒子尚㓜君䕶其䘮以歸塟之士大夫聞君之風識者指君曰是能塟舉主者君奉養至亷所得俸禄分給宗族其餘以待賔客不知者以為好名君處之裕如也在南昌時得疾暴卒更一日一夜始蘇視其家服御之物止一敝篋錢不滿百人莫不歎服此予之親見者也嘗過潯陽愛廬山因築室溪上名之曰濓溪書堂每從容為予言可止可仕古人無所必束髪為學將有以設施可澤於斯民者必不得已止未晩也此濓溪者異時與子相從於其上歌詠先王之道足矣此君之志也尤善談性理深於易學作太極圖易説易通數十篇詩十卷今藏於家母鄭氏封仙居縣太君娶陸氏職方郎中參之女再娶蒲氏太常丞師道之女子二人曰夀曰燾皆補太廟齋郎以其年十一月二十一日窆於德化縣德化鄉清泉社母夫人墓左從遺命也壽等次列其狀來請銘乃泣而為之銘曰人之不然我獨然之義貫於中貴於自期謭謭日甚風俗之偷乃如伊人吾復何求志固在我壽則有命道之不行斯謂之病釋潘志亦載太極圖稱有古人風潘其執友乎朱元晦撰行實録先生姓周氏名惇實字茂叔避厚陵藩邸名改惇頥世居道州營道父輔成大中祥符八年登蔡齊榜進士第嘗為賀州桂嶺令贈諌議大夫母鄭氏封仙居縣太君先生少孤養外家景祐中用舅氏龍圖閣學士鄭公珦奏試將作監主簿授洪州分寧主簿先生博學力行遇事剛果有古人風其為政精密嚴恕務盡道理縣有獄久不决先生至一訊立辨衆口交稱之部使者薦其才為南安軍司理獄有囚法不當死轉運使王逵欲深治之逵苛刻吏無敢與相可否者先生獨與之辨不聽則置手版歸取告身委之而去曰如此尚可仕乎殺人以媚人吾不為也逵感悟囚得不死且賢先生薦之移郴州桂陽令皆有治績用薦者改大理寺丞知洪州南昌縣於是更相告語毋違教命而以汚善政為恥也改太子中舍人簽書合州判官事轉殿中丞一郡之事不經先生手吏不敢决民不肯從清獻公為使者小人或讒先生趙公臨之甚威而先生處之超然也轉國子博士通判䖍州趙公來為守熟視先生所為執其手曰今日乃知周茂叔也遷尚書虞部員外郎通判永州權發遣邵州事新學校以教其人熈寧元年用趙公及吕正獻公薦為廣南東路轉運判官三年轉虞部郎中提㸃刑獄先生不憚出入之勞瘴毒之侵雖荒崖絶島人迹所不至處亦必緩視徐按務以洗寃澤物為己任設施措置未及盡其所為而先生病矣因請南康軍以歸趙公再尹成都復起先生朝命及門而先生卒矣熈寧六年六月七日也年五十有七塟江州德化縣清泉社娶陸氏封縉雲縣君再娶蒲氏封德清縣君子壽燾皆太廟齋郎先生所著書有太極圖易說易通數十篇詩十卷藏於家先生在南安時年甚少不為守所知洛人程公珦攝通守事視其氣貌非常人與語知其為學知道也因與為友且使其子顥頥受學焉及為郎故事當代舉每一遷授輒以薦之程公二子皆唱鳴道學以繼孔孟不傳之統世所謂二程先生者其原葢自先生發之也在郴時其守李公初平知先生賢不以屬吏遇之既薦諸朝又周其乏困嘗聞先生論學歎曰吾欲讀書如何先生曰公老矣無及也惇頥請得為公言之初平逐日聽先生語葢二年而有得王荆公提㸃江東刑獄時已號為通儒先生遇之與語連日夜荆公退而精思至忘寢食先生自少信好古義以名節自砥礪其奉己甚約俸禄盡以周宗族在南昌時得疾暴卒更一日夜始甦或視其家止一敝篋錢不滿百李初平卒子幼不克葬先生䕶其䘮歸塟之分司而歸妻子􅊡粥不給曠然不以為意也廬山之麓有溪焉築室其上名之曰濓溪因語其友清逸居士潘延之曰可仕可止古人無所必束髪為學將有以設施可澤於斯民者必不得已止未晩也此濓溪者異時與子相從於其上歌詠先王之道足矣此其出處之本意也豫章黄庭堅稱之曰茂叔人品甚髙胷中洒落如光風霽月好讀書雅志林壑不卑小官職思其憂論法常欲與民决訟得情而不喜其為使者進退官吏得罪者自以不寃濓溪之名雖不足以對其美然茂叔短於取名而樂於求志薄於徼福而厚於得民菲於奉身而燕及惸嫠短於希世而尚友千古聞茂叔之風猶足律貪則此溪之水配茂叔以永久所得多矣識者亦或有取於其言云釋行實又收黄庭堅語豈周子在廬阜時與黄逰乎然黄亦知茂叔矣周子抄釋卷二
