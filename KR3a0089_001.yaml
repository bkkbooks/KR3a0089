body:
  text: 周子抄釋卷一明吕柟撰太極圖解義新安朱子此所謂無極而太極也所以動而陽靜而隂之本體也然非有以離乎隂陽也即隂陽而指其本體不雜乎隂陽而為言耳此之動而陽靜而隂也中者其本體也者陽之動也之用所以行也者隂之靜也之體所以立也者之根也者之根也此陽變隂合而生水火木金土也者陽之變也者隂之合也隂盛故居右陽盛故居左陽稚故次火隂稚故次水冲氣故居中而水火之交系乎上者隂根陽陽根隂也水而木木而火火而土土而金金而復水如環無端五氣布四時行也五行一隂陽五殊二實無餘缺也隂陽一太極精粗本末無彼此也太極本無極上天之載無聲臭也五行之生各一其性氣殊質異各一其無假借也此無極二五所以妙合而無間也乾男坤女以氣化者言也各一其性而男女一太極也萬物化生以形化者言也各一其性而萬物一太極也此以上引說解剝圖體此以下據圖推盡說意惟人也得其秀而最靈則所謂人者於是乎在矣然形之為也神之發也五性之德也善惡男女之分也萬事萬物之象也此天下之動所以紛綸交錯而吉凶悔吝所由以生也惟聖人者又得夫秀之精而有以全乎之體用者也是以一動一靜各臻其極而天下之故常感通乎寂然不動之中蓋中也仁也感也所謂也之用所以行也正也義也寂也所謂也之體所以立也中正仁義渾然全體而靜者常為主焉則人於是乎立而天地日月四時鬼神有所不能違矣君子之戒謹恐懼所以修此而吉也小人之放僻邪侈所以悖此而凶也天地人之道各一太極也陽也剛也仁也所謂也物之始也隂也柔也義也所謂也物之終也此所謂易也而三極之道立焉實則一也故曰易有太極之謂也無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣聖人定之以中正仁義而主靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知生死之說大哉易也斯其至矣釋易言有太極者著其本也圖言無極者究其精也易言四象八卦而吉凶在大業之先者以蓍卦而論主後天也圖言隂陽五行而吉凶在萬物之後者以道而論本先天也故讀易人懼為惡玩圖人易從善通書誠上第一誠者聖人之本大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也故曰一隂一陽之謂道繼之者善也成之者性也元亨誠之通利貞誠之復大哉易也性命之源乎釋天道聖德惟一誠外此不獲罪于天即見尤于聖誠下第二聖誠而已矣誠五常之本百行之源也靜無而動有至正而明逹也五常百行非誠非也邪暗塞也故誠則無事矣至易而行難果而確無難焉故曰一日克己復禮天下歸仁焉釋誠仁一理明公一道誠幾德第三誠無為幾善惡德愛曰仁宜曰義理曰禮通曰智守曰信性焉安焉之謂聖復焉執焉之謂賢發微不可見充周不可窮之謂神釋誠其本也幾其用也德其目也故賢其學也聖其熟也神其妙也皆至于誠焉耳聖第四寂然不動者誠也感而遂通者神也動而未形有無之間者幾也誠精故明神應故妙幾微故幽誠神幾曰聖人釋幾有善惡而以誠神幾為聖人者能知幾耳慎動第五動而正曰道用而和曰德匪仁匪義匪禮匪智匪信悉邪也邪動辱也甚焉害也故君子慎動釋本在謹獨道第六聖人之道仁義中正而已矣守之貴行之利廓之配天地豈不易簡豈為難知不守不行不廓耳釋守在信行在勇廓在智師第七或問曰曷為天下善曰師曰何謂也曰性者剛柔善惡中而已矣不逹曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁柔善為慈為順為巽惡為懦弱為無斷為邪佞惟中也者和也中節也天下之逹道也聖人之事也故聖人立教俾人自易其惡自至其中而止矣故先覺覺後覺暗者求於明而師道立矣師道立則善人多善人多則朝廷正而天下治矣釋行天下逹道易得師難幸第八人之生不幸不聞過大不幸無耻必有耻則可教聞過則可賢釋不自棄方能有耻不自是方能聞過思第九洪範曰思曰睿睿作聖無思本也思通用也幾動於彼誠動於此無思而無不通為聖人不思則不能通微不睿則不能無不通是則無不通生於通微通微生於思故思者聖功之本而吉凶之機也易曰君子見幾而作不俟終日又曰知幾其神乎釋幾之不見未之思耳志學章第十聖希天賢希聖士希賢伊尹顔淵大賢也伊尹耻其君不為堯舜一夫不得其所若撻於市顔淵不遷怒不二過三月不違仁志伊尹之所志學顔子之所學過則聖及則賢不及則亦不失於令名釋顔亦尹之志尹亦顔之學順化第十一天以陽生萬物以隂成萬物生仁也成義也故聖人在上以仁育萬物以義正萬民天道行而萬物順聖德修而萬民化大順大化不見其迹莫知其然之謂神故天下之衆本在一人道豈逺乎哉術豈多乎哉釋立天之道曰隂與陽立人之道曰仁與義其神一也故順且化治第十二十室之邑人人提耳而教且不及况天下之廣兆民之衆哉曰純其心而已矣仁義禮智四者動靜言貌視聽無違之謂純心純則賢才輔賢才輔則天下治純心要矣用賢急焉釋求治而不求要急是舍耕而求食也禮樂第十三禮理也樂和也隂陽理而後和君君臣臣父父子子兄兄弟弟夫夫婦婦萬物各得其理然後和故禮先而樂後釋書言作樂在象刑惟明之後易言作樂在天下和豫之時務實第十四實勝善也名勝恥也故君子進德修業孶孳不息務實勝也德業有未著則恐恐然畏人知逺恥也小人則僞而已故君子日休小人日憂釋先憂者休先休者憂愛敬第十五有善不及曰不及則學焉問曰有不善曰不善則告之不善且勸曰庶幾有改乎斯為君子有善一不善二則學其一而勸其二有語曰斯人有是之不善非大惡也則曰孰無過焉知其不能改改則為君子矣不改為惡惡者天惡之彼豈無畏耶烏知其不能改故君子悉有衆善無弗愛且敬焉釋此可觀仁矣動靜第十六動而無靜靜而無動物也動而無動靜而無靜神也動而無動靜而無靜非不動不靜也物則不通神妙萬物水隂根陽火陽根隂五行隂陽隂陽太極四時運行萬物終始混兮闢兮其無窮兮釋君子學天斯不差樂上第十七古者聖王制禮法修教化三綱正九疇叙百姓大和萬物咸若乃作樂以宣八風之氣以平天下之情故樂聲淡而不傷和而不淫入其耳感其心莫不淡且和焉淡則欲心平和則躁心釋優柔平中德之盛也天下化中治之至也是謂道配天地古之極也後世禮法不修政刑苛紊縱欲敗度下民困苦謂古樂不足聽也代變新聲妖淫愁怨導欲增悲不能自止故有賊君棄父輕生敗倫不可禁者矣嗚呼樂者古以平心今以助欲古以宣化今以長怨不復古禮不變今樂而欲至治者逺矣釋禮古而樂不古并禮亦廢矣樂中第十八樂者本乎政也政善民安則天下之心和故聖人作樂以宣暢其和心逹於天地天地之氣感而太和焉天地和則萬物順故神祗格鳥獸馴釋樂即政之極樂下第十九樂聲淡則聽心平樂辭善則歌者慕故風移而俗易矣妖聲艷辭之化也亦然釋化係乎所感聖學第二十聖可學乎曰可曰有要乎曰有請聞焉曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥庶矣乎釋無欲便可虛直公明第二十一公於己者公於人未有不公於己而能公於人也明不至則疑生明無疑也謂能疑為明何啻千里釋公明皆自已作理性命第二十二厥彰厥微匪靈弗瑩剛善剛惡柔亦如之中焉止矣二氣五行化生萬物五殊二實二本則一是萬為一一實萬分萬一各正小大有定釋性命一理顔子第二十三顔子一簞食一瓢飲在陋巷人不堪其憂而不改其樂夫富貴人所愛也顔子不愛不求而樂乎貧者獨何心哉天地間有至貴至愛可求而異乎彼者見其大而忘其小焉爾見其大則心泰心泰則無不足無不足則富貴貧賤處之一也處之一則能化而齊故顔子亞聖釋尋顔子樂處惟見大耳師友上第二十四天地間至尊者道至貴者德而已矣至難得者人人而至難得者道德有於身而已矣求人至難得者有於身非師友則不可得也已釋惟求真師良友難師友下第二十五道義者身有之則貴且尊人生而䝉長無師友則愚是道義由師友有之而得貴且尊其義不亦重乎其聚不亦樂乎釋義聚須自得知過第二十六仲由喜聞過令名無窮焉今人有過不喜人規如護疾而忌醫寧滅其身而無悟也噫釋此子路百世之師不啻令名勢第二十七天下勢而已矣勢輕重也極重不可反識其重而亟反之可也反之力也識不早力不易也力而不競天也不識不力人也天乎人也何尤釋識力兼用文辭第二十八文所以載道也輪轅飾而人弗庸徒飾也况虛車乎文辭藝也道德實也篤其實而藝者書之美則愛愛則傳焉賢者得以學而至之是為教故曰言之無文行之不逺然不賢者雖父兄臨之師保勉之不學也強之不從也不知務道德而苐以文辭為能者藝焉而已噫弊也久矣釋道以文行亦以文泥聖藴第二十九不憤不啓不悱不發舉一隅不以三隅反則不復也子曰豫欲無言天何言哉四時行焉百物生焉然則聖人之藴微顔子殆不可見發聖人之藴教萬世無窮者顔子也聖同天不亦深乎常人有一聞知恐人不速知其有也急人知而名也薄亦甚矣釋聖人之藴顔子發猶天地之藴八卦發朱子深厚淺薄之注乃互文也精藴第三十聖人之精畫卦以示聖人之藴因卦以發卦不畫聖人之精不可得而見微卦聖人之藴殆不可悉得而聞易何止五經之源其天地鬼神之奧乎釋卦者掛也懸天地人物之理於世間如圖畫然也乾損益動第三十一君子乾乾不息於誠然必懲忿窒欲遷善改過而後至乾之用其善是損益之大莫是過聖人之㫖深哉吉凶悔吝生乎動噫吉一而已動可不愼乎釋君子學天莫先損益吉由是出也朱子曰思誠之方家人睽復無妄第三十二治天下有本身之謂也治天下有則家之謂也本必端端本誠心而已矣則必善善則和親而已矣家難而天下易家親而天下疏也家人離必起於婦人故睽次家人以二女同居而志不同行也堯所以釐降二女于媯汭舜可禪乎吾兹試矣是治天下觀於家治家觀身而已矣身端心誠之謂也誠心復其不善之動而已矣不善之動妄也妄復則無妄矣無妄則誠矣故無妄次復而曰先王以茂對時育萬物深哉釋茂育萬物起于復不善之動人可不猛省富貴第三十三君子以道充為貴身安為富故常泰無不足而銖視軒冕塵視金玉其重無加焉爾釋身安則心正家齊可知他不足道也陋第三十四聖人之道入乎耳存乎心藴之為德行行之為事業彼以文辭而已者陋矣釋入耳存心有不言而信之義故為德行事業擬議第三十五至誠則動動則變變則化故曰擬之而後言議之而後動擬議以成其變化釋擬議所以求學至誠故朱子曰誠之之事也刑第三十六天以春生萬物止之以秋物之生也既成矣不止則過焉故得秋以成聖人之法天以政飬萬民肅之以刑民之盛也欲動情勝利害相攻不止則賊滅無倫焉故得刑以治情僞微曖其變千狀茍非中正明逹果斷者不能治也訟卦曰利見大人以剛得中也噬嗑曰利用獄以動而明也嗚呼天下之廣主刑者民之司命也任用可不愼乎釋張敬夫以中正為仁明逹為智果斷為勇則德者刑之本也故利見大人公第三十七聖人之道至公而已矣或曰何謂也曰天地至公而已矣釋公則無偏無遺孔子上第三十八春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者於前所以懼生者於後也宜乎萬世無窮王祀夫子報德報功之無盡焉釋夫子之功宜不止此孔子下第三十九道德高厚教化無窮實與天地參而四時同其惟孔子乎釋朱子謂孔子其太極亶其然乎蒙艮第四十童䝉求我我正果行如筮焉筮叩神也再三則瀆矣瀆則不告也山下出泉靜而清也汩則亂亂不决也愼哉其惟時中乎艮其背背非見也靜則止止非為也為不止矣其道也深乎釋教人修己皆惟靜乎太極圖通書後序建安本朱子右周子之書一編今舂陵零陵九江皆有本而互有同異長沙本最後出乃熹所編定視他本最詳密矣然猶有所未盡也蓋先生之學其妙具於太極一圖通書之指皆發此圖之藴而程先生兄弟語及性命之際亦未嘗不因其說觀通書之誠動靜理性命等章及程氏之書李仲通銘程邵公志顔子好學論等篇則可見矣故潘清逸志先生之墓敘所著書特以作太極圖為稱首然則此圖當為書首不疑也然先生既手以授二程本因附書後邢寬居之云傳者見其如此遂誤以圖為書之卒章不復釐正使先生立象盡意之微㫖暗而不明而驟讀通書者亦復不知有所總攝此則諸本皆失之而長沙通書因胡氏所傳篇章非復本次又削去分章之目而别以周子曰加之於書之大義雖若無害然要非先生之舊亦有去其目而遂不可曉者如理性命章之類又諸本附載銘碣詩文事多重復亦或不能有以發明於先生之道以待學者故今特據潘志置圖篇端以為先生之精意則可以通乎書之說矣至於書之分章定次亦皆復其舊貫而取公及蒲左丞孔司封黃太史所記先生行事之實刪去重復合為一篇以便觀者蓋世所傳先生之書言行具此矣潘公所謂易通疑即通書而易說獨不可見向見友人多蓄異書自謂有傳本亟取而觀焉則淺陋可笑皆今之時舉子綴葺緒餘與圖說通書絶不相似不問可知其僞獨不知世復有能得其真者與否以圖書推之知其所發當極精要微言湮沒甚可惜也熹又嘗讀朱內翰震進易說表謂此圖之傳自陳摶种放穆修而來而五峯胡公仁仲作通書序又謂先生非止為种穆之學者此特其學之一師耳非其至者也夫以先生之學之妙不出此圖以為得之於人則决非种穆所及以為非其至者則先生之學又何以加於此圖哉是以竊嘗疑之及得志文考之然後知果先生之所自作而非有所受於人者公蓋皆未見此志而云云耳然胡公所論通書之指曰人見其書之約而不知其道之大也見其文之質而不知其義之精也見其言之淡而不知其味之長也人有真能立伊尹之志修顔子之學則知此書之言包括至大而聖門之事業無窮矣此則不可易之至論讀是書者所宜知也因復掇取以系於後云乾道己丑六月戊申新安朱熹謹記又南康本前人右周子太極圖并說一篇通書四十章世傳舊本遺文九篇遺事十五條事狀一篇熹所集次皆以校定可繕寫熹今附見於此學者得以考焉通書後跋張栻濓溪周先生通書友人朱熹元晦以太極圖列於篇首而題之曰太極通書栻刻於嚴陵學宫以示多士嗟乎自聖學不明語道者不睹夫大全卑則割裂而無統髙則汗漫而不精是以性命之說不參乎事物之際而經世之務僅出乎私意小智之為豈不可歎哉惟先生生乎千有餘載之後超然獨得夫大易之傳所謂太極圖乃其綱領也推明動靜之一源以見生化之不窮天命流行之體無乎不在文理密察本末該貫非闡微極幽莫能識其指歸也然而學者若之何而可以進於是哉亦曰敬而已矣誠能起居食息主一而不舍則其德性之知必有卓然不可掩於體察之際者而後先生之藴可得而窮太極可得而識矣乾道庚寅閏月謹題周子抄釋卷一
